name: Sync to Obsidian Vault

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Update obsidian-vault
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.OBSIDIAN_PAT }}
          script: |
            const owner = 'gcnamkw-blip';
            const repo = 'obsidian-vault';
            const path = '01_Projects/2026_고만고만/웹페이지_동기화.md';
            const now = new Date().toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' });
            const commitMsg = context.payload.head_commit.message;
            const commitUrl = context.payload.head_commit.url;

            const content = [
              '# 고만고만 웹페이지 동기화',
              '',
              `마지막 업데이트: ${now}`,
              '',
              '## 공개 페이지',
              '<https://gcnamkw-blip.github.io/gomangoman-2026/>',
              '',
              '## 최근 변경사항',
              `- ${commitMsg}`,
              `- [커밋 보기](${commitUrl})`,
            ].join('\n');

            let sha;
            try {
              const { data } = await github.rest.repos.getContent({ owner, repo, path });
              sha = data.sha;
            } catch (e) {}

            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path,
              message: `sync: gomangoman-2026 업데이트 반영`,
              content: Buffer.from(content).toString('base64'),
              sha,
            });
